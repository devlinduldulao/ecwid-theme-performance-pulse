<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Theme Performance Pulse App Banner</title>
  <desc id="desc">Banner art for the Theme Performance Pulse owner dashboard app listing.</desc>
  <defs>
    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a314b"/>
      <stop offset="55%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#c7f0e8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="#eef5f4"/>
  <circle cx="168" cy="120" r="240" fill="#d8f2ec" fill-opacity="0.85"/>
  <rect x="90" y="98" width="1420" height="704" rx="44" fill="url(#hero)"/>
  <g transform="translate(154 170)">
    <text x="0" y="0" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="30" letter-spacing="8" fill="#d7f9f2">ECWID OWNER DASHBOARD</text>
    <text x="0" y="96" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="92" font-weight="700" fill="#ffffff">Theme Performance Pulse</text>
    <text x="0" y="164" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="34" fill="#edfdf9">Run live audits, review preview states, and spot storefront issues without a backend.</text>
  </g>
  <g transform="translate(900 190)">
    <rect width="470" height="480" rx="30" fill="#ffffff" fill-opacity="0.92"/>
    <text x="34" y="54" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#162433">Owner Dashboard</text>
    <rect x="34" y="92" width="180" height="62" rx="31" fill="#0f766e"/>
    <text x="124" y="131" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Preview Demo</text>
    <rect x="234" y="92" width="190" height="62" rx="31" fill="#edf7f4" stroke="#d5dde5"/>
    <text x="329" y="131" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#0b3c5d">Run Audit</text>
    <rect x="34" y="188" width="120" height="140" rx="24" fill="#eefbf7" stroke="#d5dde5"/>
    <rect x="176" y="188" width="120" height="140" rx="24" fill="#fff7e5" stroke="#ead8a7"/>
    <rect x="318" y="188" width="120" height="140" rx="24" fill="#fff1ef" stroke="#efc1bc"/>
    <text x="94" y="236" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="18" letter-spacing="2" fill="#5f6b76">AVG PERF</text>
    <text x="94" y="286" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="52" font-weight="700" fill="#0f766e">84</text>
    <text x="236" y="236" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="18" letter-spacing="2" fill="#5f6b76">CRITICAL</text>
    <text x="236" y="286" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="52" font-weight="700" fill="#c27803">1</text>
    <text x="378" y="236" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="18" letter-spacing="2" fill="#5f6b76">PAGES</text>
    <text x="378" y="286" text-anchor="middle" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="52" font-weight="700" fill="#b42318">4</text>
    <rect x="34" y="360" width="404" height="88" rx="20" fill="#ffffff" stroke="#d5dde5"/>
    <text x="62" y="402" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#162433">Top issue</text>
    <text x="62" y="432" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="21" fill="#5f6b76">Compress product gallery assets</text>
  </g>
