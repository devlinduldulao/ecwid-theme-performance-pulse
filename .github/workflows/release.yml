name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: npm run build && npm run lint && npm test

      - name: Build publish bundle
        run: npm run publish:bundle

      - name: Archive release artifacts
        run: |
          mkdir -p release-artifacts
          zip -r release-artifacts/theme-performance-pulse-ecwid-publish-bundle-${GITHUB_REF_NAME:-manual}.zip publish
          zip -r release-artifacts/theme-performance-pulse-ecwid-dist-${GITHUB_REF_NAME:-manual}.zip dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: theme-performance-pulse-ecwid-release-artifacts
          path: release-artifacts/

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/theme-performance-pulse-ecwid-publish-bundle-${{ github.ref_name }}.zip
            release-artifacts/theme-performance-pulse-ecwid-dist-${{ github.ref_name }}.zip